<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fixlt Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Product Description & Architecture Document for Fixlt">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Theme: Vue (clean and readable) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Custom tweaks for better readability */
    :root {
      --theme-color: #42b983;
    }
  </style>
</head>
<body>
  <div id="app">Loading Fixlt Docs...</div>
  <script>
    window.$docsify = {
      name: 'Fixlt Docs',
      repo: '',
      loadSidebar: true, // Enables the sidebar
      subMaxLevel: 2,    // Automatically generates sidebar links from your markdown headers (H2)
      auto2top: true,    // Scrolls to top when changing pages
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    }
  </script>
  <!-- Docsify v4 core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Mermaid diagram support -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.doneEach(function() { mermaid.run(); });
    });
  </script>
</body>
</html>
